<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Área Restrita</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="icon" type="image/png" href="/Imagens/logofavicon.png">
</head>

<body class="min-vh-100 d-flex align-items-center justify-content-center py-4 px-3">

    <main class="login-wrapper w-100" style="max-width: 420px;">
        
        <div class="text-center mb-3">
            <a href="index.html" class="back-link d-inline-flex align-items-center gap-2">
                <i class="fas fa-arrow-left"></i> Voltar para a página inicial
            </a>
        </div>

        <section class="card login-card border-0">
            
            <div class="card-header">
                <div class="d-flex align-items-center justify-content-between">
                    <span class="header-title d-flex align-items-center gap-2">
                        <i class="fas fa-user-lock"></i>
                        Acesso Restrito
                    </span>

                    <button
                        class="theme-toggle"
                        id="themeToggle"
                        type="button"
                        title="Alternar tema"
                        aria-label="Alternar entre modo claro e escuro"
                    >
                        <span class="theme-toggle-icons">
                            <i class="fas fa-sun"></i>
                            <i class="fas fa-moon"></i>
                        </span>
                    </button>
                </div>
            </div>

            <div class="card-body">

                <form id="loginForm">

                    <div class="mb-3">
                        <label class="form-label d-flex align-items-center gap-2" for="username">
                            <i class="far fa-user"></i> Usuário
                        </label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="username" 
                            placeholder="Digite seu usuário" 
                            required
                        >
                    </div>

                    <div class="mb-4">
                        <label class="form-label d-flex align-items-center gap-2" for="password">
                            <i class="fas fa-key"></i> Senha
                        </label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            placeholder="Digite sua senha" 
                            required
                        >
                    </div>

                    <div id="erroLogin" class="alert alert-danger mb-3 d-none" role="alert"></div>

                    <button type="submit" class="btn btn-login w-100">
                        Entrar no Painel <i class="fas fa-sign-in-alt ms-1"></i>
                    </button>

                    <!-- Aviso com usuário e senha -->
                    <div class="alert alert-warning mt-3 text-center" role="alert">
                        <strong>Credenciais de teste:</strong><br>
                        Usuário: <b>admin</b><br>
                        Senha: <b>12345678</b>
                    </div>

                </form>

                <hr class="form-divider my-4">

                <div class="info-box border p-3">
                    <p class="info-title mb-1">
                        <i class="fas fa-info-circle me-1"></i> Acesso ao Sistema
                    </p>
                    <p class="mb-0">Área protegida por autenticação.</p>
                </div>

            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

    <script>
        // Alternar tema
        (() => {
            const html = document.documentElement;
            const toggle = document.getElementById('themeToggle');

            html.setAttribute(
                'data-theme',
                localStorage.getItem('theme') ?? 'light'
            );

            toggle.addEventListener('click', () => {
                const next =
                    html.getAttribute('data-theme') === 'light'
                        ? 'dark'
                        : 'light';

                html.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
            });
        })();

        // Sistema de login
        document
            .getElementById("loginForm")
            .addEventListener("submit", function(event) {
                event.preventDefault();

                const usuario = document.getElementById("username").value.trim();
                const senha = document.getElementById("password").value.trim();
                const erroLogin = document.getElementById("erroLogin");

                const usuarioCorreto = "admin";
                const senhaCorreta = "12345678";

                if (usuario === usuarioCorreto && senha === senhaCorreta) {
                    localStorage.setItem("logado", "true");
                    window.location.href = "dashboard.html";
                } else {
                    erroLogin.textContent = "Usuário ou senha incorretos!";
                    erroLogin.classList.remove("d-none");
                }
            });
    </script>

</body>
</html>
