<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Área Restrita | Wave Club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/login.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="icon" type="image/png" href="/assets/img/logofavicon.png">
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center py-4 px-3">

  <main class="login-wrapper w-100" style="max-width:420px;">
    <section class="card login-card border-0">
      <div class="card-header">
        <div class="d-flex align-items-center justify-content-between">
          <span class="header-title d-flex align-items-center gap-2">
            <i class="fas fa-user-lock"></i> Acesso Restrito
          </span>
          <button class="theme-toggle" id="themeToggle" type="button" title="Alternar tema">
            <i class="fas fa-moon" id="themeIcon"></i>
          </button>
        </div>
      </div>

      <div class="card-body">
        <form id="loginForm" onsubmit="fazerLogin(event)">
          <div class="mb-3">
            <label class="form-label d-flex align-items-center gap-2" for="username">
              <i class="far fa-user"></i> Usuário
            </label>
            <input type="text" class="form-control" id="username"
                   placeholder="Digite seu usuário" required autocomplete="username">
          </div>
          <div class="mb-4">
            <label class="form-label d-flex align-items-center gap-2" for="password">
              <i class="fas fa-key"></i> Senha
            </label>
            <input type="password" class="form-control" id="password"
                   placeholder="Digite sua senha" required autocomplete="current-password">
          </div>

          <div id="erroLogin" class="alert alert-danger mb-3 d-none" role="alert"></div>

          <button type="submit" class="btn btn-login w-100" id="btnLogin">
            Entrar no Painel <i class="fas fa-sign-in-alt ms-1"></i>
          </button>

          <div class="alert alert-warning mt-3 text-center" role="alert">
            <strong>Credenciais de teste:</strong><br>
            admin / admin123 &nbsp;|&nbsp; usuario / user123
          </div>
        </form>

        <hr class="form-divider my-1">
        <div class="info-box border p-2">
          <p class="info-title mb-1"><i class="fas fa-info-circle me-1"></i>Acesso ao Sistema</p>
          <p class="mb-0">Área protegida por autenticação.</p>
        </div>
        <div class="text-center my-2">
          <a href="/" class="back-link d-inline-flex align-items-center gap-2">
            <i class="fas fa-arrow-left"></i> Voltar para a página inicial
          </a>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Tema
    (() => {
      const html   = document.documentElement;
      const toggle = document.getElementById('themeToggle');
      const icon   = document.getElementById('themeIcon');
      const saved  = localStorage.getItem('theme') || 'light';
      html.setAttribute('data-theme', saved);
      icon.className = saved === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
      toggle.addEventListener('click', () => {
        const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        icon.className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
      });
    })();

    // Verifica se já está logado
    fetch('/api/sessao', { credentials:'include' })
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d?.success) window.location.href = d.user.role === 'admin' ? '/dashboard' : '/painel'; })
      .catch(() => {});

    // Login via API
    async function fazerLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const erroEl   = document.getElementById('erroLogin');
      const btn      = document.getElementById('btnLogin');

      erroEl.classList.add('d-none');
      btn.disabled    = true;
      btn.textContent = 'Aguarde…';

      try {
        const res  = await fetch('/api/login', {
          method:  'POST',
          headers: { 'Content-Type':'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = data.redirectTo;
        } else {
          erroEl.textContent = data.message || 'Credenciais inválidas.';
          erroEl.classList.remove('d-none');
          btn.disabled    = false;
          btn.innerHTML   = 'Entrar no Painel <i class="fas fa-sign-in-alt ms-1"></i>';
        }
      } catch(err) {
        erroEl.textContent = 'Erro de conexão.';
        erroEl.classList.remove('d-none');
        btn.disabled    = false;
        btn.innerHTML   = 'Entrar no Painel <i class="fas fa-sign-in-alt ms-1"></i>';
      }
    }

    document.addEventListener('keydown', e => { if(e.key === 'Enter') document.getElementById('loginForm').requestSubmit(); });
  </script>
</body>
</html>
